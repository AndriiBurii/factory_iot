version: "3.8"

services:
  # 1. Our long-term storage for all our data
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: factory_db
    ports:
      - "5432:5432"

  # 2. Our high-speed cache
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # 3. Our Go server
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  # 4. Our React dashboard
  frontend:
    build: ./frontend
    ports:
      - "80:80" # Our React dashboard will now be accessible on the standard 80 port
    depends_on:
      - backend
